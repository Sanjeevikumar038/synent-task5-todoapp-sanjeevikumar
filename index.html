<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Better To-Do App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <div class="hero-backdrop"></div>
    <section class="panel-header">
      <div>
        <span class="eyebrow">Focus flow</span>
        <h1>Better To-Do App</h1>
        <p>Track tasks faster, organize smarter, and keep everything saved locally.</p>
      </div>
      <div class="status-row">
        <span class="status-chip">Local-first • No sync needed</span>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">Light mode</button>
      </div>
    </section>

    <section class="todo-panel">
      <form id="task-form" class="task-form" aria-label="Add new task">
        <div class="form-row">
          <input id="task-input" type="text" placeholder="What do you want to get done?" aria-label="Task description" required />
          <button type="submit">Add Task</button>
        </div>
        <div class="form-row inputs-row">
          <label class="date-label" for="task-due">Due date: <input id="task-due" type="date" aria-label="Task due date" /></label>
          <div class="select-wrapper">
            <select id="task-priority" aria-label="Task priority">
              <option value="medium" selected>Priority: Medium</option>
              <option value="high">Priority: High</option>
              <option value="low">Priority: Low</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>
        <textarea id="task-notes" rows="2" placeholder="Optional notes or subtasks" aria-label="Task notes"></textarea>
        <input id="task-tags" type="text" placeholder="Tags: work, personal, urgent (comma separated)" aria-label="Task tags" />
      </form>

      <div class="search-panel">
        <label class="search-label" for="task-search">
          <input id="task-search" type="search" placeholder="Search tasks" aria-label="Search tasks" />
        </label>
      </div>

      <div id="tag-filter-bar" class="tag-filter-bar" aria-label="Filter by tag"></div>

      <div class="controls">
        <div class="filters">
          <button class="filter-button active" data-filter="all">All</button>
          <button class="filter-button" data-filter="active">Active</button>
          <button class="filter-button" data-filter="completed">Completed</button>
        </div>
        <div class="action-buttons">
          <button id="mark-all-complete" class="secondary">Mark All Complete</button>
          <select id="sort-tasks" class="sort-select" aria-label="Sort tasks">
            <option value="default">Sort: Default</option>
            <option value="priority">Sort: Priority</option>
            <option value="due">Sort: Due Date</option>
            <option value="created">Sort: Created</option>
          </select>
        </div>
      </div>

      <div class="summary-row">
        <div class="task-summary" aria-live="polite">
          <span id="task-count">0 tasks</span>
          <span id="completed-count">0 completed</span>
        </div>
        <div class="progress-chip" id="progress-chip">0% complete</div>
      </div>

      <div class="controls controls-secondary">
        <button id="export-tasks" class="secondary">Export Tasks</button>
        <button id="import-tasks" class="secondary">Import Tasks</button>
      </div>

      <input id="import-file" type="file" accept="application/json" hidden />
      <div id="undo-toast" class="undo-toast hidden" role="status" aria-live="polite">
        Task deleted. <button id="undo-delete" type="button">Undo</button>
      </div>

      <ul id="task-list" class="task-list" aria-label="Task list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
